<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Completo Ovandu Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:#f5f7fb;color:#333;padding:20px;scroll-behavior:smooth;}
h1,h2{color:#0F172A;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ccc;padding:10px;text-align:left;}
th{background:#0F172A;color:white;}
button{padding:6px 12px;border:none;border-radius:6px;background:#22C55E;color:white;cursor:pointer;}
button:hover{background:#16A34A;}
input, select{padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
#formEntrega{margin-top:20px;background:white;padding:15px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.08);}
</style>
</head>
<body>

<h1>Painel de Administração</h1>

<h2>Membros do Time</h2>
<ul id="listaMembros"></ul>
<input type="text" id="novoMembro" placeholder="Nome do Membro">
<button onclick="adicionarMembro()">Adicionar Membro</button>

<h2>Entregas de Sistemas</h2>
<table id="tabelaSistemas">
<thead>
<tr>
<th>Cliente</th>
<th>Sistema</th>
<th>Arquivo</th>
<th>Email</th>
<th>Telefone</th>
<th>Membro</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Registrar Nova Entrega</h2>
<div id="formEntrega">
<input type="text" id="cliente" placeholder="Nome do Cliente" required>
<input type="text" id="sistema" placeholder="Nome do Sistema" required>
<input type="email" id="email" placeholder="Email do Cliente" required>
<input type="text" id="telefone" placeholder="Telefone do Cliente" required>
<select id="membro"></select>
<input type="file" id="arquivoSistema" required>
<button onclick="registrarEntrega()">Registrar Entrega</button>
</div>

<script>
const API_URL = "http://localhost:3000";
const MEU_NUMERO = "244925146189";
const MEU_EMAIL = "avindodossantos0@gmail.com";

let membros = [];
let entregas = [];

// ===== Membros =====
async function carregarMembros() {
  const res = await fetch(`${API_URL}/membros`);
  const data = await res.json();
  membros = data.map(m=>m.nome);
  atualizarListaMembros();
}

async function adicionarMembro() {
  const nome = document.getElementById('novoMembro').value.trim();
  if(!nome) return alert('Digite um nome válido');

  await fetch(`${API_URL}/membros`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ nome })
  });

  document.getElementById('novoMembro').value='';
  carregarMembros();
}

function atualizarListaMembros() {
  const lista = document.getElementById('listaMembros');
  const select = document.getElementById('membro');
  lista.innerHTML = '';
  select.innerHTML = '<option value="">Selecione</option>';

  membros.forEach((m,index)=>{
    const li = document.createElement('li');
    li.textContent = m + ' ';
    const btn = document.createElement('button');
    btn.textContent='Remover';
    btn.onclick=()=>{
      membros.splice(index,1);
      carregarMembros();
    };
    li.appendChild(btn);
    lista.appendChild(li);

    const option = document.createElement('option');
    option.value=m;
    option.textContent=m;
    select.appendChild(option);
  });
}

// ===== Entregas =====
async function carregarEntregas() {
  const res = await fetch(`${API_URL}/entregas`);
  entregas = await res.json();
  atualizarTabela();
}

async function registrarEntrega() {
  const cliente = document.getElementById('cliente').value.trim();
  const sistema = document.getElementById('sistema').value.trim();
  const email = document.getElementById('email').value.trim();
  const telefone = document.getElementById('telefone').value.trim();
  const membro = document.getElementById('membro').value;
  const arquivoInput = document.getElementById('arquivoSistema');

  if(!cliente || !sistema || !email || !telefone || !membro || !arquivoInput.files[0])
    return alert('Preencha todos os campos');

  const formData = new FormData();
  formData.append("cliente", cliente);
  formData.append("sistema", sistema);
  formData.append("email", email);
  formData.append("telefone", telefone);
  formData.append("membro", membro);
  formData.append("arquivo", arquivoInput.files[0]);

  await fetch(`${API_URL}/entregas`, { method: "POST", body: formData });

  document.getElementById('cliente').value='';
  document.getElementById('sistema').value='';
  document.getElementById('email').value='';
  document.getElementById('telefone').value='';
  document.getElementById('membro').value='';
  arquivoInput.value='';

  carregarEntregas();
}

function atualizarTabela(){
  const tbody = document.getElementById('tabelaSistemas').querySelector('tbody');
  tbody.innerHTML='';
  entregas.forEach((e,index)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${e.cliente}</td>
      <td>${e.sistema}</td>
      <td><a href="${e.arquivo}" download="${e.nomeArquivo}">${e.nomeArquivo}</a></td>
      <td>${e.email}</td>
      <td>${e.telefone}</td>
      <td>${e.membro}</td>
      <td>${e.status}</td>
      <td>
        <button onclick="marcarConcluido(${index})">Concluir</button>
        <button onclick="enviarWhatsApp(${index})">WhatsApp</button>
        <button onclick="enviarEmail(${index})">Email</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// Marcar como concluído
async function marcarConcluido(index) {
  const e = entregas[index];
  await fetch(`${API_URL}/entregas/${e.id}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ status: "Concluído" })
  });
  carregarEntregas();
}

// Enviar WhatsApp
function enviarWhatsApp(index){
  const e = entregas[index];
  const msg = encodeURIComponent(`Olá ${e.cliente}, seu sistema "${e.sistema}" está pronto. Baixe aqui: ${e.arquivo}`);
  const numero = e.telefone ? e.telefone : MEU_NUMERO;
  window.open(`https://wa.me/${numero}?text=${msg}`,'_blank');
}

// Enviar Email
function enviarEmail(index){
  const e = entregas[index];
  const assunto = encodeURIComponent(`Entrega do Sistema "${e.sistema}"`);
  const corpo = encodeURIComponent(`Olá ${e.cliente},\n\nSeu sistema "${e.sistema}" foi entregue com sucesso pelo membro ${e.membro}.\nVocê pode baixar o arquivo aqui: ${e.arquivo}\n\nAtenciosamente,\nOvandu Systems`);
  const email = e.email ? e.email : MEU_EMAIL;
  window.open(`mailto:${email}?subject=${assunto}&body=${corpo}`,'_blank');
}

// Ao carregar a página
window.onload = () => {
  carregarMembros();
  carregarEntregas();
}
</script>

</body>
</html>
